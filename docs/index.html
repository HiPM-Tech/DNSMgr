<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNSMgr 文档中心</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #3eaf7c;
      --theme-color-light: #4abf8a;
    }
    
    .app-name-link img {
      width: 40px;
      height: 40px;
    }
    
    .cover-main {
      text-align: center;
      padding: 100px 20px;
    }
    
    .cover-main h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .cover-main blockquote {
      font-size: 1.2rem;
      color: #666;
      border: none;
      margin: 20px 0;
    }
    
    .cover-main .buttons {
      margin-top: 40px;
    }
    
    .cover-main .buttons a {
      display: inline-block;
      padding: 12px 30px;
      margin: 0 10px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    
    .cover-main .buttons a:first-child {
      background: var(--theme-color);
      color: white;
    }
    
    .cover-main .buttons a:first-child:hover {
      background: var(--theme-color-light);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(62, 175, 124, 0.3);
    }
    
    .cover-main .buttons a:last-child {
      border: 2px solid var(--theme-color);
      color: var(--theme-color);
    }
    
    .cover-main .buttons a:last-child:hover {
      background: var(--theme-color);
      color: white;
    }
    
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      padding: 60px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .feature-card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
    }
    
    .feature-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    
    .feature-card h3 {
      color: var(--theme-color);
      margin-bottom: 15px;
      font-size: 1.3rem;
    }
    
    .feature-card p {
      color: #666;
      line-height: 1.6;
    }
    
    .api-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-right: 8px;
    }
    
    .api-badge.get { background: #61affe; color: white; }
    .api-badge.post { background: #49cc90; color: white; }
    .api-badge.put { background: #fca130; color: white; }
    .api-badge.delete { background: #f93e3e; color: white; }
    
    .markdown-section pre {
      background: #f8f9fa;
      border-radius: 8px;
    }
    
    .markdown-section pre > code {
      padding: 20px;
    }
    
    .sidebar-nav li {
      margin: 5px 0;
    }
    
    .sidebar-nav a {
      padding: 8px 15px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    
    .sidebar-nav a:hover {
      background: rgba(62, 175, 124, 0.1);
    }
    
    .sidebar-nav .active {
      background: rgba(62, 175, 124, 0.15);
      color: var(--theme-color);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'DNSMgr',
      repo: 'https://github.com/HiPM-Tech/DNSMgr',
      logo: '/_media/logo.png',
      homepage: 'README.md',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 3,
      auto2top: true,
      coverpage: true,
      onlyCover: false,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '找不到结果',
        depth: 6
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true,
        crossChapterText: true
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            return html
              .replace(/<code class="lang-http">/g, '<code class="lang-http" style="background:#1e1e1e;color:#d4d4d4;">')
              .replace(/<code class="lang-bash">/g, '<code class="lang-bash" style="background:#1e1e1e;color:#d4d4d4;">')
              .replace(/<code class="lang-python">/g, '<code class="lang-python" style="background:#1e1e1e;color:#d4d4d4;">')
              .replace(/<code class="lang-javascript">/g, '<code class="lang-javascript" style="background:#1e1e1e;color:#d4d4d4;">')
              .replace(/<code class="lang-json">/g, '<code class="lang-json" style="background:#1e1e1e;color:#d4d4d4;">');
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-http.min.js"></script>
</body>
</html>
