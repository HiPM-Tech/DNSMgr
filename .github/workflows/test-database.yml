name: Database Test

on:
  workflow_call:
    inputs:
      database:
        required: true
        type: string
        description: 'Database type (sqlite, postgresql, mysql)'
      test_type:
        required: true
        type: string
        default: 'all'
        description: 'Test type (unit, integration, e2e, all)'

jobs:
  test-database:
    name: Test ${{ inputs.database }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dnsmgr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: dnsmgr_test
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter dnsmgr-server install --frozen-lockfile

      - name: Test Initialization (Fresh)
        id: init-fresh
        run: |
          cd server
          rm -f .env
          cat > .env << EOF
          DB_TYPE=${{ inputs.database }}
          ${{ inputs.database == 'postgresql' && 'DB_HOST=localhost
          DB_PORT=5432
          DB_USER=test
          DB_PASSWORD=test
          DB_NAME=dnsmgr_test' || '' }}
          ${{ inputs.database == 'mysql' && 'DB_HOST=localhost
          DB_PORT=3306
          DB_USER=test
          DB_PASSWORD=test
          DB_NAME=dnsmgr_test' || '' }}
          ${{ inputs.database == 'sqlite' && 'DB_PATH=:memory:' || '' }}
          JWT_SECRET=test-secret-${{ inputs.database }}
          NODE_ENV=test
          EOF

          echo "Testing initialization with ${{ inputs.database }}..."
          pnpm run test:init

      - name: Test Basic Functions (with MOCK)
        id: test-basic
        run: |
          cd server
          echo "MOCK_DNS_PROVIDERS=true" >> .env
          echo "MOCK_EMAIL_SERVICE=true" >> .env
          echo "MOCK_EXTERNAL_API=true" >> .env

          pnpm test
        env:
          CI: true

      - name: Test Data Persistence
        id: test-persistence
        run: |
          cd server
          pnpm run test:seed
          pnpm run test:verify-data

      - name: Test After .env Removal
        id: test-no-env
        run: |
          cd server
          cp .env .env.backup
          rm -f .env
          pnpm run test:init-detect || true
          mv .env.backup .env

      - name: Test Database Migrations
        id: test-migrations
        run: |
          cd server
          pnpm run db:migrate:test
          pnpm run db:rollback:test
          pnpm run db:migrate:test

      - name: Test Concurrent Connections
        id: test-concurrent
        run: |
          cd server
          pnpm run test:concurrent

      - name: Test Error Recovery
        id: test-recovery
        run: |
          cd server
          pnpm run test:error-recovery

      - name: Collect Test Results
        id: collect-results
        if: always()
        run: |
          echo "## Test Results for ${{ inputs.database }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Initialization (Fresh) | ${{ steps.init-fresh.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Basic Functions | ${{ steps.test-basic.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Persistence | ${{ steps.test-persistence.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| After .env Removal | ${{ steps.test-no-env.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Migrations | ${{ steps.test-migrations.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Concurrent Connections | ${{ steps.test-concurrent.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Error Recovery | ${{ steps.test-recovery.outcome }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ inputs.database }}
          path: |
            server/coverage/
            server/test-results/
            server/logs/
          retention-days: 7

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./server/coverage/lcov.info
          flags: ${{ inputs.database }}-integration
          name: ${{ inputs.database }}-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Check Critical Tests
        if: always()
        run: |
          if [[ "${{ steps.init-fresh.outcome }}" == "failure" ]] || \
             [[ "${{ steps.test-basic.outcome }}" == "failure" ]]; then
            echo "Critical tests failed for ${{ inputs.database }}!"
            exit 1
          fi
          echo "All critical tests passed for ${{ inputs.database }}!"
