name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.1.0)'
        required: true
        default: ''
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        default: false
        type: boolean
      build_exe:
        description: 'Build Windows package?'
        required: false
        default: true
        type: boolean
      build_docker:
        description: 'Build Docker image?'
        required: false
        default: true
        type: boolean
      draft:
        description: 'Create as draft release?'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-windows:
    if: inputs.build_exe == true
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          $VERSION = "${{ inputs.version }}"
          if ($VERSION -eq "") {
            $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          }
          $VERSION = $VERSION -replace '^v', ''
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build server
        run: pnpm --filter dnsmgr-server build

      - name: Build client
        run: pnpm --filter dnsmgr-client build

      - name: Create Windows ZIP Package
        shell: pwsh
        run: |
          $VERSION = "${{ steps.get_version.outputs.version }}"
          New-Item -ItemType Directory -Force -Path "release-dist"
          
          # Download Node.js 20
          $nodeUrl = "https://nodejs.org/dist/v20.11.0/node-v20.11.0-win-x64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile "node.zip"
          Expand-Archive -Path "node.zip" -DestinationPath "release-dist" -Force
          Rename-Item -Path "release-dist/node-v20.11.0-win-x64" -NewName "nodejs" -Force
          
          # Copy files
          New-Item -ItemType Directory -Force -Path "release-dist/server"
          Copy-Item -Path "server/dist" -Destination "release-dist/server/" -Recurse -Force
          Copy-Item -Path "server/package.json" -Destination "release-dist/server/" -Force
          
          New-Item -ItemType Directory -Force -Path "release-dist/client"
          Copy-Item -Path "client/dist" -Destination "release-dist/client/" -Recurse -Force
          
          # Copy node_modules (copy entire directory to ensure all sub-dependencies are included)
          Copy-Item -Path "server/node_modules" -Destination "release-dist/server/" -Recurse -Force
          
          # Create start script (without BOM)
          $batLines = @(
            '@echo off',
            'echo Starting DNSMgr Server...',
            'set NODE_PATH=%~dp0server\node_modules',
            'set PATH=%~dp0nodejs;%PATH%',
            '"%~dp0nodejs\node.exe" "%~dp0server\dist\app.js"',
            'pause'
          )
          $batContent = $batLines -join "`r`n"
          [System.IO.File]::WriteAllText("release-dist/Start-DNSMgr.bat", $batContent, [System.Text.Encoding]::ASCII)
          
          Compress-Archive -Path "release-dist/*" -DestinationPath "DNSMgr-Windows-v$VERSION.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: DNSMgr-Windows-*.zip
          retention-days: 7

  build-docker:
    if: inputs.build_docker == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.get_version.outputs.version }}
            type=raw,value=latest,enable=${{ inputs.prerelease == false }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: [build-windows, build-docker]
    if: always() && (needs.build-windows.result == 'success' || needs.build-docker.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download artifact
        if: inputs.build_exe == true
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: DNSMgr v${{ steps.get_version.outputs.version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: ./artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
