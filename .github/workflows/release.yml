name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.1.0)'
        required: true
        default: ''
        type: string
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        default: false
        type: boolean
      build_exe:
        description: 'Build Windows package?'
        required: false
        default: true
        type: boolean
      build_linux_x64:
        description: 'Build Linux x64 package?'
        required: false
        default: true
        type: boolean
      build_linux_arm64:
        description: 'Build Linux ARM64 package?'
        required: false
        default: true
        type: boolean
      build_macos_intel:
        description: 'Build macOS Intel package?'
        required: false
        default: true
        type: boolean
      build_macos_arm:
        description: 'Build macOS ARM package?'
        required: false
        default: true
        type: boolean
      build_windows_arm:
        description: 'Build Windows ARM package?'
        required: false
        default: true
        type: boolean
      build_docker:
        description: 'Build Docker image?'
        required: false
        default: true
        type: boolean
      draft:
        description: 'Create as draft release?'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # 阶段 1: 准备版本信息
  # ============================================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_prerelease: ${{ inputs.prerelease }}
      build_exe: ${{ inputs.build_exe }}
      build_linux_x64: ${{ inputs.build_linux_x64 }}
      build_linux_arm64: ${{ inputs.build_linux_arm64 }}
      build_macos_intel: ${{ inputs.build_macos_intel }}
      build_macos_arm: ${{ inputs.build_macos_arm }}
      build_windows_arm: ${{ inputs.build_windows_arm }}
      build_docker: ${{ inputs.build_docker }}
      image_name_lower: ${{ steps.get_version.outputs.image_name_lower }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image_name_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

  # ============================================================================
  # 阶段 2: 构建 Windows 安装包
  # ============================================================================
  build-windows:
    name: Build Windows Package
    if: inputs.build_exe == true
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build server
        run: pnpm --filter dnsmgr-server build

      - name: Build client
        run: pnpm --filter dnsmgr-client build

      - name: Create Windows ZIP Package
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          New-Item -ItemType Directory -Force -Path "release-dist"

          # Download Node.js 20
          $nodeUrl = "https://nodejs.org/dist/v20.11.0/node-v20.11.0-win-x64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile "node.zip"
          Expand-Archive -Path "node.zip" -DestinationPath "release-dist" -Force
          Rename-Item -Path "release-dist/node-v20.11.0-win-x64" -NewName "nodejs" -Force

          # Copy files
          New-Item -ItemType Directory -Force -Path "release-dist/server"
          Copy-Item -Path "server/dist" -Destination "release-dist/server/" -Recurse -Force
          Copy-Item -Path "server/package.json" -Destination "release-dist/server/" -Force

          New-Item -ItemType Directory -Force -Path "release-dist/client"
          Copy-Item -Path "client/dist" -Destination "release-dist/client/" -Recurse -Force

          # Use npm to install dependencies in the release directory
          Set-Location -Path "release-dist/server"
          npm install --production --no-package-lock
          Set-Location -Path "../../"

          # Create start script (without BOM)
          $batLines = @(
            '@echo off',
            'echo Starting DNSMgr Server...',
            'set NODE_PATH=%~dp0server\node_modules',
            'set PATH=%~dp0nodejs;%PATH%',
            '"%~dp0nodejs\node.exe" "%~dp0server\dist\app.js"',
            'pause'
          )
          $batContent = $batLines -join "`r`n"
          [System.IO.File]::WriteAllText("release-dist/Start-DNSMgr.bat", $batContent, [System.Text.Encoding]::ASCII)

          Compress-Archive -Path "release-dist/*" -DestinationPath "DNSMgr-Windows-v$VERSION.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: DNSMgr-Windows-*.zip
          retention-days: 7

  # ============================================================================
  # 阶段 2.1: 构建 Windows ARM64 安装包
  # ============================================================================
  build-windows-arm:
    name: Build Windows ARM64 Package
    if: inputs.build_windows_arm == true
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build server
        run: pnpm --filter dnsmgr-server build

      - name: Build client
        run: pnpm --filter dnsmgr-client build

      - name: Create Windows ARM64 ZIP Package
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          New-Item -ItemType Directory -Force -Path "release-dist"

          # Download Node.js 20 ARM64
          $nodeUrl = "https://nodejs.org/dist/v20.11.0/node-v20.11.0-win-arm64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile "node.zip"
          Expand-Archive -Path "node.zip" -DestinationPath "release-dist" -Force
          Rename-Item -Path "release-dist/node-v20.11.0-win-arm64" -NewName "nodejs" -Force

          # Copy files
          New-Item -ItemType Directory -Force -Path "release-dist/server"
          Copy-Item -Path "server/dist" -Destination "release-dist/server/" -Recurse -Force
          Copy-Item -Path "server/package.json" -Destination "release-dist/server/" -Force

          New-Item -ItemType Directory -Force -Path "release-dist/client"
          Copy-Item -Path "client/dist" -Destination "release-dist/client/" -Recurse -Force

          # Use npm to install dependencies in the release directory
          Set-Location -Path "release-dist/server"
          npm install --production --no-package-lock
          Set-Location -Path "../../"

          # Create start script (without BOM)
          $batLines = @(
            '@echo off',
            'echo Starting DNSMgr Server...',
            'set NODE_PATH=%~dp0server\node_modules',
            'set PATH=%~dp0nodejs;%PATH%',
            '"%~dp0nodejs\node.exe" "%~dp0server\dist\app.js"',
            'pause'
          )
          $batContent = $batLines -join "`r`n"
          [System.IO.File]::WriteAllText("release-dist/Start-DNSMgr.bat", $batContent, [System.Text.Encoding]::ASCII)

          Compress-Archive -Path "release-dist/*" -DestinationPath "DNSMgr-Windows-ARM64-v$VERSION.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm-package
          path: DNSMgr-Windows-ARM64-*.zip
          retention-days: 7

  # ============================================================================
  # 阶段 2.2: 构建 Linux x64 启动包
  # ============================================================================
  build-linux-x64:
    name: Build Linux x64 Package
    if: inputs.build_linux_x64 == true
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build server
        run: pnpm --filter dnsmgr-server build

      - name: Build client
        run: pnpm --filter dnsmgr-client build

      - name: Create Linux x64 Package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p release-dist

          # Download Node.js 20 x64
          NODE_URL="https://nodejs.org/dist/v20.11.0/node-v20.11.0-linux-x64.tar.xz"
          curl -L $NODE_URL -o node.tar.xz
          tar -xf node.tar.xz -C release-dist
          mv release-dist/node-v20.11.0-linux-x64 release-dist/nodejs

          # Copy files
          mkdir -p release-dist/server
          cp -r server/dist release-dist/server/
          cp server/package.json release-dist/server/

          mkdir -p release-dist/client
          cp -r client/dist release-dist/client/

          # Install production dependencies
          cd release-dist/server
          npm install --production --no-package-lock
          cd ../..

          # Create start script
          printf '#!/bin/bash\necho "Starting DNSMgr Server..."\nexport NODE_PATH=$(dirname "$0")/server/node_modules\nexport PATH=$(dirname "$0")/nodejs/bin:$PATH\n$(dirname "$0")/nodejs/bin/node $(dirname "$0")/server/dist/app.js\n' > release-dist/start-dnsmgr.sh
          chmod +x release-dist/start-dnsmgr.sh

          # Create tar.gz package
          tar -czf "DNSMgr-Linux-x64-v$VERSION.tar.gz" -C release-dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-package
          path: DNSMgr-Linux-x64-*.tar.gz
          retention-days: 7

  # ============================================================================
  # 阶段 2.3: 构建 Linux ARM64 启动包
  # ============================================================================
  build-linux-arm64:
    name: Build Linux ARM64 Package
    if: inputs.build_linux_arm64 == true
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build server
        run: pnpm --filter dnsmgr-server build

      - name: Build client
        run: pnpm --filter dnsmgr-client build

      - name: Create Linux ARM64 Package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p release-dist

          # Download Node.js 20 ARM64
          NODE_URL="https://nodejs.org/dist/v20.11.0/node-v20.11.0-linux-arm64.tar.xz"
          curl -L $NODE_URL -o node.tar.xz
          tar -xf node.tar.xz -C release-dist
          mv release-dist/node-v20.11.0-linux-arm64 release-dist/nodejs

          # Copy files
          mkdir -p release-dist/server
          cp -r server/dist release-dist/server/
          cp server/package.json release-dist/server/

          mkdir -p release-dist/client
          cp -r client/dist release-dist/client/

          # Install production dependencies
          cd release-dist/server
          npm install --production --no-package-lock
          cd ../..

          # Create start script
          printf '#!/bin/bash\necho "Starting DNSMgr Server..."\nexport NODE_PATH=$(dirname "$0")/server/node_modules\nexport PATH=$(dirname "$0")/nodejs/bin:$PATH\n$(dirname "$0")/nodejs/bin/node $(dirname "$0")/server/dist/app.js\n' > release-dist/start-dnsmgr.sh
          chmod +x release-dist/start-dnsmgr.sh

          # Create tar.gz package
          tar -czf "DNSMgr-Linux-ARM64-v$VERSION.tar.gz" -C release-dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-package
          path: DNSMgr-Linux-ARM64-*.tar.gz
          retention-days: 7

  # ============================================================================
  # 阶段 2.4: 构建 macOS Intel 启动包
  # ============================================================================
  build-macos-intel:
    name: Build macOS Intel Package
    if: inputs.build_macos_intel == true
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build server
        run: pnpm --filter dnsmgr-server build

      - name: Build client
        run: pnpm --filter dnsmgr-client build

      - name: Create macOS Intel Package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p release-dist

          # Download Node.js 20 x64 for macOS
          NODE_URL="https://nodejs.org/dist/v20.11.0/node-v20.11.0-darwin-x64.tar.xz"
          curl -L $NODE_URL -o node.tar.xz
          tar -xf node.tar.xz -C release-dist
          mv release-dist/node-v20.11.0-darwin-x64 release-dist/nodejs

          # Copy files
          mkdir -p release-dist/server
          cp -r server/dist release-dist/server/
          cp server/package.json release-dist/server/

          mkdir -p release-dist/client
          cp -r client/dist release-dist/client/

          # Install production dependencies
          cd release-dist/server
          npm install --production --no-package-lock
          cd ../..

          # Create start script
          printf '#!/bin/bash\necho "Starting DNSMgr Server..."\nexport NODE_PATH=$(dirname "$0")/server/node_modules\nexport PATH=$(dirname "$0")/nodejs/bin:$PATH\n$(dirname "$0")/nodejs/bin/node $(dirname "$0")/server/dist/app.js\n' > release-dist/start-dnsmgr.sh
          chmod +x release-dist/start-dnsmgr.sh

          # Create tar.gz package
          tar -czf "DNSMgr-macOS-Intel-v$VERSION.tar.gz" -C release-dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-package
          path: DNSMgr-macOS-Intel-*.tar.gz
          retention-days: 7

  # ============================================================================
  # 阶段 2.5: 构建 macOS ARM 启动包
  # ============================================================================
  build-macos-arm:
    name: Build macOS ARM Package
    if: inputs.build_macos_arm == true
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build server
        run: pnpm --filter dnsmgr-server build

      - name: Build client
        run: pnpm --filter dnsmgr-client build

      - name: Create macOS ARM Package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p release-dist

          # Download Node.js 20 ARM64 for macOS
          NODE_URL="https://nodejs.org/dist/v20.11.0/node-v20.11.0-darwin-arm64.tar.xz"
          curl -L $NODE_URL -o node.tar.xz
          tar -xf node.tar.xz -C release-dist
          mv release-dist/node-v20.11.0-darwin-arm64 release-dist/nodejs

          # Copy files
          mkdir -p release-dist/server
          cp -r server/dist release-dist/server/
          cp server/package.json release-dist/server/

          mkdir -p release-dist/client
          cp -r client/dist release-dist/client/

          # Install production dependencies
          cd release-dist/server
          npm install --production --no-package-lock
          cd ../..

          # Create start script
          printf '#!/bin/bash\necho "Starting DNSMgr Server..."\nexport NODE_PATH=$(dirname "$0")/server/node_modules\nexport PATH=$(dirname "$0")/nodejs/bin:$PATH\n$(dirname "$0")/nodejs/bin/node $(dirname "$0")/server/dist/app.js\n' > release-dist/start-dnsmgr.sh
          chmod +x release-dist/start-dnsmgr.sh

          # Create tar.gz package
          tar -czf "DNSMgr-macOS-ARM-v$VERSION.tar.gz" -C release-dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-package
          path: DNSMgr-macOS-ARM-*.tar.gz
          retention-days: 7

  # ============================================================================
  # 阶段 3: 并行构建 Docker AMD64 和 ARM64
  # ============================================================================
  build-docker-amd64:
    name: Build Docker AMD64
    if: inputs.build_docker == true
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}:${{ needs.prepare.outputs.version }}-amd64
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output build info
        run: |
          echo "Platform: linux/amd64"
          echo "Tag: ${{ needs.prepare.outputs.version }}-amd64"

  build-docker-arm64:
    name: Build Docker ARM64
    if: inputs.build_docker == true
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}:${{ needs.prepare.outputs.version }}-arm64
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output build info
        run: |
          echo "Platform: linux/arm64"
          echo "Tag: ${{ needs.prepare.outputs.version }}-arm64"

  # ============================================================================
  # 阶段 4: 创建多架构 manifest
  # ============================================================================
  merge-docker:
    name: Create Release Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [prepare, build-docker-amd64, build-docker-arm64]
    if: always() && needs.build-docker-amd64.result == 'success' && needs.build-docker-arm64.result == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          IS_PRERELEASE="${{ needs.prepare.outputs.is_prerelease }}"

          # 创建版本 tag 的 manifest
          docker buildx imagetools create \
            --tag "${IMAGE_BASE}:${VERSION}" \
            "${IMAGE_BASE}:${VERSION}-amd64" \
            "${IMAGE_BASE}:${VERSION}-arm64"

          # 如果不是预发布，创建 latest tag
          if [ "$IS_PRERELEASE" != "true" ]; then
            docker buildx imagetools create \
              --tag "${IMAGE_BASE}:latest" \
              "${IMAGE_BASE}:${VERSION}-amd64" \
              "${IMAGE_BASE}:${VERSION}-arm64"
          fi

          echo "Multi-arch manifest created successfully"

      - name: Output manifest info
        run: |
          echo "Image: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}"
          echo "Version Tag: ${{ needs.prepare.outputs.version }}"
          echo "Is Prerelease: ${{ needs.prepare.outputs.is_prerelease }}"
          echo "Platforms: linux/amd64, linux/arm64"

  # ============================================================================
  # 阶段 5: 创建 GitHub Release
  # ============================================================================
  create-release:
    name: Create GitHub Release
    needs: [prepare, build-windows, build-windows-arm, build-linux-x64, build-linux-arm64, build-macos-intel, build-macos-arm, merge-docker]
    if: always() && (needs.build-windows.result == 'success' || needs.build-windows-arm.result == 'success' || needs.build-linux-x64.result == 'success' || needs.build-linux-arm64.result == 'success' || needs.build-macos-intel.result == 'success' || needs.build-macos-arm.result == 'success' || needs.merge-docker.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changelog_content: ${{ steps.changelog.outputs.content }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows x64 artifact
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: ./artifacts

      - name: Download Windows ARM64 artifact
        if: needs.build-windows-arm.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-arm-package
          path: ./artifacts

      - name: Download Linux x64 artifact
        if: needs.build-linux-x64.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-package
          path: ./artifacts

      - name: Download Linux ARM64 artifact
        if: needs.build-linux-arm64.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-package
          path: ./artifacts

      - name: Download macOS Intel artifact
        if: needs.build-macos-intel.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-intel-package
          path: ./artifacts

      - name: Download macOS ARM artifact
        if: needs.build-macos-arm.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: macos-arm-package
          path: ./artifacts

      - name: Read CHANGELOG
        id: changelog
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          # 提取当前版本的 changelog（从 ## [版本号] 到下一个 ## [ 或文件结束）
          CHANGELOG_CONTENT=$(awk "/^## \\[$VERSION\\]/ {flag=1; next} /^## \\[/ {flag=0} flag" docs/CHANGELOG.md)
          if [ -z "$CHANGELOG_CONTENT" ]; then
            CHANGELOG_CONTENT="详见 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/docs/CHANGELOG.md)"
          fi
          # 将多行内容写入 GitHub Actions 输出
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: DNSMgr v${{ needs.prepare.outputs.version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            ./artifacts/*.zip
            ./artifacts/*.tar.gz
          body: ${{ steps.changelog.outputs.content }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # 阶段 6: 发送 Telegram 通知
  # ============================================================================
  notify-telegram:
    name: Send Telegram Notification
    needs: [prepare, create-release]
    if: always() && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Determine release type
        id: release-type
        run: |
          if [ "${{ needs.prepare.outputs.is_prerelease }}" = "true" ]; then
            echo "type=🚧 预发布版本" >> $GITHUB_OUTPUT
          else
            echo "type=🎉 正式版本发布" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          topic: 14
          format: markdown
          message: |
            *${{ steps.release-type.outputs.type }}*
            _${{ github.repository }}_
            
            *🔖 版本标签：*
            `v${{ needs.prepare.outputs.version }}`
            
            *📄 发布标题：*
            DNSMgr v${{ needs.prepare.outputs.version }}
            
            * 更新日志：*
            ```
            ${{ needs.create-release.outputs.changelog_content }}
            ```
            
            * 链接：*
            [GitHub Release 页面](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.prepare.outputs.version }})
            
            *📅 发布时间：*
            ${{ github.event.workflow_run.created_at || github.event.inputs._workflow_run_time || 'N/A' }}
