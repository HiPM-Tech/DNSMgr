name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.1.0)'
        required: true
        default: ''
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        default: false
        type: boolean
      build_exe:
        description: 'Build Windows package?'
        required: false
        default: true
        type: boolean
      build_docker:
        description: 'Build Docker image?'
        required: false
        default: true
        type: boolean
      draft:
        description: 'Create as draft release?'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # 阶段 1: 准备版本信息
  # ============================================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_prerelease: ${{ inputs.prerelease }}
      build_exe: ${{ inputs.build_exe }}
      build_docker: ${{ inputs.build_docker }}
      image_name_lower: ${{ steps.get_version.outputs.image_name_lower }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image_name_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

  # ============================================================================
  # 阶段 2: 构建 Windows 安装包
  # ============================================================================
  build-windows:
    name: Build Windows Package
    if: inputs.build_exe == true
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build server
        run: pnpm --filter dnsmgr-server build

      - name: Build client
        run: pnpm --filter dnsmgr-client build

      - name: Create Windows ZIP Package
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          New-Item -ItemType Directory -Force -Path "release-dist"

          # Download Node.js 20
          $nodeUrl = "https://nodejs.org/dist/v20.11.0/node-v20.11.0-win-x64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile "node.zip"
          Expand-Archive -Path "node.zip" -DestinationPath "release-dist" -Force
          Rename-Item -Path "release-dist/node-v20.11.0-win-x64" -NewName "nodejs" -Force

          # Copy files
          New-Item -ItemType Directory -Force -Path "release-dist/server"
          Copy-Item -Path "server/dist" -Destination "release-dist/server/" -Recurse -Force
          Copy-Item -Path "server/package.json" -Destination "release-dist/server/" -Force

          New-Item -ItemType Directory -Force -Path "release-dist/client"
          Copy-Item -Path "client/dist" -Destination "release-dist/client/" -Recurse -Force

          # Use npm to install dependencies in the release directory
          Set-Location -Path "release-dist/server"
          npm install --production --no-package-lock
          Set-Location -Path "../../"

          # Create start script (without BOM)
          $batLines = @(
            '@echo off',
            'echo Starting DNSMgr Server...',
            'set NODE_PATH=%~dp0server\node_modules',
            'set PATH=%~dp0nodejs;%PATH%',
            '"%~dp0nodejs\node.exe" "%~dp0server\dist\app.js"',
            'pause'
          )
          $batContent = $batLines -join "`r`n"
          [System.IO.File]::WriteAllText("release-dist/Start-DNSMgr.bat", $batContent, [System.Text.Encoding]::ASCII)

          Compress-Archive -Path "release-dist/*" -DestinationPath "DNSMgr-Windows-v$VERSION.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: DNSMgr-Windows-*.zip
          retention-days: 7

  # ============================================================================
  # 阶段 3: 并行构建 Docker AMD64 和 ARM64
  # ============================================================================
  build-docker-amd64:
    name: Build Docker AMD64
    if: inputs.build_docker == true
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}:${{ needs.prepare.outputs.version }}-amd64
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output build info
        run: |
          echo "Platform: linux/amd64"
          echo "Tag: ${{ needs.prepare.outputs.version }}-amd64"

  build-docker-arm64:
    name: Build Docker ARM64
    if: inputs.build_docker == true
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}:${{ needs.prepare.outputs.version }}-arm64
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output build info
        run: |
          echo "Platform: linux/arm64"
          echo "Tag: ${{ needs.prepare.outputs.version }}-arm64"

  # ============================================================================
  # 阶段 4: 创建多架构 manifest
  # ============================================================================
  merge-docker:
    name: Create Release Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [prepare, build-docker-amd64, build-docker-arm64]
    if: always() && needs.build-docker-amd64.result == 'success' && needs.build-docker-arm64.result == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          IS_PRERELEASE="${{ needs.prepare.outputs.is_prerelease }}"

          # 创建版本 tag 的 manifest
          docker buildx imagetools create \
            --tag "${IMAGE_BASE}:${VERSION}" \
            "${IMAGE_BASE}:${VERSION}-amd64" \
            "${IMAGE_BASE}:${VERSION}-arm64"

          # 如果不是预发布，创建 latest tag
          if [ "$IS_PRERELEASE" != "true" ]; then
            docker buildx imagetools create \
              --tag "${IMAGE_BASE}:latest" \
              "${IMAGE_BASE}:${VERSION}-amd64" \
              "${IMAGE_BASE}:${VERSION}-arm64"
          fi

          echo "Multi-arch manifest created successfully"

      - name: Output manifest info
        run: |
          echo "Image: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}"
          echo "Version Tag: ${{ needs.prepare.outputs.version }}"
          echo "Is Prerelease: ${{ needs.prepare.outputs.is_prerelease }}"
          echo "Platforms: linux/amd64, linux/arm64"

  # ============================================================================
  # 阶段 5: 创建 GitHub Release
  # ============================================================================
  create-release:
    name: Create GitHub Release
    needs: [prepare, build-windows, merge-docker]
    if: always() && (needs.build-windows.result == 'success' || needs.merge-docker.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: DNSMgr v${{ needs.prepare.outputs.version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: ./artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
