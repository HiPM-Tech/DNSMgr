name: Nightly Docker Build

on:
  push:
    branches:
      - main
  
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to registry'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up date tag
        run: |
          echo "DATE_TAG=$(date +%Y%m%d)" >> $GITHUB_ENV
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        if: github.event.inputs.push != 'false'
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:nightly-${{ env.DATE_TAG }}-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:nightly
          no-cache: true
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ env.DATE_TAG }}

      - name: Output build information
        run: |
          echo "========================================"
          echo "Nightly Docker Build Completed"
          echo "========================================"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Triggered by: ${{ github.event_name }}"
          echo "========================================"

  verify-image:
    runs-on: ubuntu-latest
    needs: build-nightly
    permissions:
      contents: read
      packages: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Pull and verify Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:nightly
          echo "Verifying Docker image labels:"
          docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:nightly --format='{{json .Config.Labels}}'
          echo ""
          echo "Image size:"
          docker images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:nightly --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
          echo ""
          echo "Image verification completed successfully!"
