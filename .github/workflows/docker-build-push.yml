name: Build and Push Docker Image (Push Trigger)

# Trigger on push to main/master branch
on:
  push:
    branches:
      - main
      - master
    # Only trigger if relevant files changed
    paths:
      - 'server/**'
      - 'client/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/docker-build-push.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag calculation

      - name: Get latest tag and calculate next version
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Parse version components (support both 3-segment and 4-segment versions)
          VERSION=${LATEST_TAG#v}

          # Count number of segments
          SEGMENT_COUNT=$(echo "$VERSION" | tr '.' '\n' | wc -l)

          if [ "$SEGMENT_COUNT" -eq 4 ]; then
            # 4-segment version: MAJOR.MINOR.PATCH.BUILD (e.g., 0.0.4.4)
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            BUILD=$(echo $VERSION | cut -d. -f4 | cut -d- -f1)

            # Increment build number
            NEW_BUILD=$((BUILD + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}.${NEW_BUILD}"

            echo "version_format=4-segment" >> $GITHUB_OUTPUT
            echo "build=$BUILD" >> $GITHUB_OUTPUT
            echo "new_build=$NEW_BUILD" >> $GITHUB_OUTPUT
          else
            # 3-segment version: MAJOR.MINOR.PATCH (e.g., 0.1.5)
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3 | cut -d- -f1)

            # Increment patch version
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

            echo "version_format=3-segment" >> $GITHUB_OUTPUT
            echo "patch=$PATCH" >> $GITHUB_OUTPUT
            echo "new_patch=$NEW_PATCH" >> $GITHUB_OUTPUT
          fi

          # Check if this is a beta release (look for beta in commit message or branch)
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi "beta"; then
            IS_BETA="true"
            TAG="${NEW_VERSION}-beta"
          else
            IS_BETA="false"
            TAG="${NEW_VERSION}"
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_beta=$IS_BETA" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "Calculated version: $NEW_VERSION"
          echo "Tag: $TAG"
          echo "Is beta: $IS_BETA"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.new_version }}
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            ${{ steps.version.outputs.is_beta == 'false' && 'type=raw,value=latest' || '' }}
            ${{ steps.version.outputs.is_beta == 'true' && 'type=raw,value=beta' || '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ steps.version.outputs.tag }}" -m "Release v${{ steps.version.outputs.tag }}"
          git push origin "v${{ steps.version.outputs.tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output image info
        run: |
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Version: ${{ steps.version.outputs.new_version }}"
          echo "Is Beta: ${{ steps.version.outputs.is_beta }}"
