name: Build and Push Docker Image (Push Trigger)

# Trigger on push to main/master branch
on:
  push:
    branches:
      - main
      - master
    # Only trigger if relevant files changed
    paths:
      - 'server/**'
      - 'client/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/docker-build*.yml'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      is_beta: ${{ steps.version.outputs.is_beta }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag calculation

      - name: Get latest tag and calculate next version
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Parse version components (support both 3-segment and 4-segment versions)
          VERSION=${LATEST_TAG#v}

          # Count number of segments
          SEGMENT_COUNT=$(echo "$VERSION" | tr '.' '\n' | wc -l)

          if [ "$SEGMENT_COUNT" -eq 4 ]; then
            # 4-segment version: MAJOR.MINOR.PATCH.BUILD (e.g., 0.0.4.4)
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            BUILD=$(echo $VERSION | cut -d. -f4 | cut -d- -f1)

            # Increment build number
            NEW_BUILD=$((BUILD + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}.${NEW_BUILD}"
          else
            # 3-segment version: MAJOR.MINOR.PATCH (e.g., 0.1.5)
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3 | cut -d- -f1)

            # Increment patch version
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi

          # Check if this is a beta release (look for beta in commit message or branch)
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi "beta"; then
            IS_BETA="true"
            TAG="${NEW_VERSION}-beta"
          else
            IS_BETA="false"
            TAG="${NEW_VERSION}"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_beta=$IS_BETA" >> $GITHUB_OUTPUT
          echo "Calculated version: $NEW_VERSION"
          echo "Tag: $TAG"
          echo "Is beta: $IS_BETA"

  trigger-build:
    needs: version
    uses: ./.github/workflows/docker-build.yml
    with:
      tag: ${{ needs.version.outputs.tag }}
      beta: ${{ needs.version.outputs.is_beta == 'true' }}
      push: 'true'
    secrets: inherit

  create-tag:
    needs: [version, trigger-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Git tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ needs.version.outputs.tag }}" -m "Release v${{ needs.version.outputs.tag }}"
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "v${{ needs.version.outputs.tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
