name: Test Suite

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
      - 'hotfix/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - master
      - develop
      - 'release/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - e2e
      database:
        description: 'Database to test'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - sqlite
          - postgresql
          - mysql

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: |
          pnpm --filter dnsmgr-server run lint || true
          pnpm --filter dnsmgr-client run lint || true

      - name: Type check
        run: |
          pnpm --filter dnsmgr-server run build
          pnpm --filter client run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            server/dist
            client/dist
          retention-days: 1

  unit-test-server:
    name: Unit Test - Server
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm --filter dnsmgr-server run test -- --coverage --testPathPattern="\.test\.ts$" --testPathIgnorePatterns="e2e"

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./server/coverage/lcov.info
          flags: server-unit
          name: server-unit-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  unit-test-client:
    name: Unit Test - Client
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm --filter dnsmgr-client run test -- --coverage --passWithNoTests || true

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./client/coverage/lcov.info
          flags: client-unit
          name: client-unit-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  test-sqlite:
    name: Test - SQLite
    needs: lint-and-build
    if: ${{ github.event.inputs.database == 'all' || github.event.inputs.database == 'sqlite' || github.event.inputs.database == '' }}
    uses: ./.github/workflows/test-database.yml
    with:
      database: sqlite
      test_type: ${{ github.event.inputs.test_type || 'all' }}

  test-postgresql:
    name: Test - PostgreSQL
    needs: lint-and-build
    if: ${{ github.event.inputs.database == 'all' || github.event.inputs.database == 'postgresql' || github.event.inputs.database == '' }}
    uses: ./.github/workflows/test-database.yml
    with:
      database: postgresql
      test_type: ${{ github.event.inputs.test_type || 'all' }}

  test-mysql:
    name: Test - MySQL
    needs: lint-and-build
    if: ${{ github.event.inputs.database == 'all' || github.event.inputs.database == 'mysql' || github.event.inputs.database == '' }}
    uses: ./.github/workflows/test-database.yml
    with:
      database: mysql
      test_type: ${{ github.event.inputs.test_type || 'all' }}

  e2e-test:
    name: E2E Test
    runs-on: ubuntu-latest
    needs: [lint-and-build, test-sqlite]
    if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'e2e' || github.event.inputs.test_type == '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm --filter dnsmgr-e2e exec playwright install --with-deps

      - name: Start server (SQLite mode)
        run: |
          cd server
          echo "DB_TYPE=sqlite" > .env
          echo "DB_PATH=:memory:" >> .env
          echo "JWT_SECRET=test-secret" >> .env
          pnpm run start &
          sleep 5

      - name: Run E2E tests
        run: pnpm --filter dnsmgr-e2e run test

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-test-server, unit-test-client, test-sqlite, test-postgresql, test-mysql, e2e-test]
    if: always()
    steps:
      - name: Generate test report
        run: |
          echo "# Test Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Build | ${{ needs.lint-and-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Test - Server | ${{ needs.unit-test-server.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Test - Client | ${{ needs.unit-test-client.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test - SQLite | ${{ needs.test-sqlite.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test - PostgreSQL | ${{ needs.test-postgresql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test - MySQL | ${{ needs.test-mysql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Test | ${{ needs.e2e-test.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        run: |
          if [[ "${{ needs.unit-test-server.result }}" == "failure" ]] || \
             [[ "${{ needs.unit-test-client.result }}" == "failure" ]] || \
             [[ "${{ needs.test-sqlite.result }}" == "failure" ]] || \
             [[ "${{ needs.test-postgresql.result }}" == "failure" ]] || \
             [[ "${{ needs.test-mysql.result }}" == "failure" ]]; then
            echo "Some tests failed!"
            exit 1
          fi
          echo "All tests passed!"
