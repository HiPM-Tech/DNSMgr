name: Build and Push Docker Image

# This workflow can only be triggered manually
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g., 0.1.0)'
        required: true
        default: ''
      beta:
        description: 'Beta release (auto add -beta suffix if not present, skip latest tag)'
        required: false
        default: false
        type: boolean
      push:
        description: 'Push to registry'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io
  # Dynamically get repository name from GitHub context
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process version tag
        id: version
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          IS_BETA="${{ github.event.inputs.beta }}"
          
          # Remove 'v' prefix if present
          TAG="${INPUT_TAG#v}"
          
          # If beta is checked and tag doesn't contain 'beta', add '-beta' suffix
          if [ "$IS_BETA" = "true" ] && [[ ! "$TAG" =~ beta ]]; then
            TAG="${TAG}-beta"
          fi
          
          echo "processed_tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_beta=$IS_BETA" >> $GITHUB_OUTPUT
          echo "Original tag: $INPUT_TAG"
          echo "Processed tag: $TAG"
          echo "Is beta: $IS_BETA"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event.inputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.processed_tag }}
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            ${{ github.event.inputs.beta != 'true' && 'type=raw,value=latest' || '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Labels: ${{ steps.meta.outputs.labels }}"
          echo "Is Beta: ${{ steps.version.outputs.is_beta }}"
