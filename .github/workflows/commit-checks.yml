name: Commit Checks

on:
  push:
    branches-ignore:
      - main
      - master
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 提交信息检查
  commit-message:
    name: Commit Message
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Commit Messages
        run: |
          # 获取本次推送的所有提交
          COMMITS=$(git log --format=%s origin/${{ github.event.before }}..${{ github.event.after }} 2>/dev/null || git log --format=%s -n 10)
          
          echo "检查提交信息..."
          echo "$COMMITS"
          
          # 检查每个提交信息
          FAILED=0
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            
            echo "检查: $commit"
            
            # 检查长度
            if [ ${#commit} -lt 10 ]; then
              echo "  ❌ 提交信息太短"
              FAILED=1
              continue
            fi
            
            # 检查格式 (conventional commits)
            if [[ ! "$commit" =~ ^(feat|fix|docs|style|refactor|test|chore|ci|build|perf|revert)(\(.+\))?!?:\s.+ ]]; then
              echo "  ⚠️ 建议使用 conventional commits 格式"
              echo "     例如: feat: 添加新功能"
              echo "          fix: 修复bug"
              echo "          docs: 更新文档"
            else
              echo "  ✅ 格式正确"
            fi
          done <<< "$COMMITS"
          
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

  # 快速测试
  quick-test:
    name: Quick Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Server Dependencies
        run: |
          cd server
          npm ci

      - name: Install Client Dependencies
        run: |
          cd client
          npm ci

      - name: Lint Check
        run: |
          cd server
          npm run lint || echo "⚠️ Server lint issues"
          cd ../client
          npm run lint || echo "⚠️ Client lint issues"

      - name: Type Check
        run: |
          cd server
          npm run build --noEmit 2>/dev/null || npm run build

      - name: Quick Unit Test
        run: |
          cd server
          npm test -- --testNamePattern="Database|Auth" --passWithNoTests || echo "⚠️ Some tests failed"

  # 文件检查
  file-check:
    name: File Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check File Size
        run: |
          # 检查大文件
          LARGE_FILES=$(find . -type f -size +1M ! -path "./node_modules/*" ! -path "./.git/*" 2>/dev/null)
          
          if [ -n "$LARGE_FILES" ]; then
            echo "⚠️ 发现大文件(>1MB):"
            echo "$LARGE_FILES"
          fi

      - name: Check File Encoding
        run: |
          # 检查非UTF-8编码的文件
          NON_UTF8=$(file -i $(find . -type f \( -name "*.ts" -o -name "*.js" -o -name "*.json" \) ! -path "./node_modules/*" ! -path "./.git/*" 2>/dev/null) | grep -v "charset=utf-8" || true)
          
          if [ -n "$NON_UTF8" ]; then
            echo "⚠️ 发现非UTF-8编码的文件:"
            echo "$NON_UTF8"
          fi

      - name: Check Trailing Whitespace
        run: |
          # 检查行尾空格
          TRAILING=$(grep -r -l ' $' --include="*.ts" --include="*.js" --include="*.json" --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null || true)
          
          if [ -n "$TRAILING" ]; then
            echo "⚠️ 发现行尾空格:"
            echo "$TRAILING"
          fi

  # 安全检查
  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Check for Sensitive Patterns
        run: |
          # 检查敏感信息模式
          PATTERNS=(
            "password\s*=\s*['\"][^'\"]+['\"]"
            "api[_-]?key\s*=\s*['\"][^'\"]+['\"]"
            "secret\s*=\s*['\"][^'\"]+['\"]"
            "token\s*=\s*['\"][^'\"]+['\"]"
          )
          
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -r -i -n "$pattern" --include="*.ts" --include="*.js" --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "⚠️ 发现可能的敏感信息 ($pattern):"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          
          if [ $FOUND -eq 1 ]; then
            echo "请检查上述文件是否包含敏感信息"
          fi

  # 总结
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [commit-message, quick-test, file-check, security-check]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 提交检查摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**分支:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**提交:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 提交信息 | ${{ needs.commit-message.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 快速测试 | ${{ needs.quick-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 文件检查 | ${{ needs.file-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 安全检查 | ${{ needs.security-check.result }} |" >> $GITHUB_STEP_SUMMARY
