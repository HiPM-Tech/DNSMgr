name: Commit Checks

on:
  push:
    branches-ignore:
      - main
      - master
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-message:
    name: Commit Message
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Commit Messages
        run: |
          COMMITS=$(git log --format=%s origin/${{ github.event.before }}..${{ github.event.after }} 2>/dev/null || git log --format=%s -n 10)

          echo "检查提交信息..."
          echo "$COMMITS"

          FAILED=0
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue

            echo "检查: $commit"

            if [ ${#commit} -lt 10 ]; then
              echo "  ❌ 提交信息太短"
              FAILED=1
              continue
            fi

            if [[ ! "$commit" =~ ^(feat|fix|docs|style|refactor|test|chore|ci|build|perf|revert)(\(.+\))?!?:\s.+ ]]; then
              echo "  ⚠️ 建议使用 conventional commits 格式"
              echo "     例如: feat: 添加新功能"
              echo "          fix: 修复bug"
              echo "          docs: 更新文档"
            else
              echo "  ✅ 格式正确"
            fi
          done <<< "$COMMITS"

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

  quick-test:
    name: Quick Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Check
        run: |
          pnpm --filter dnsmgr-server run lint || echo "⚠️ Server lint issues"
          pnpm --filter dnsmgr-client run lint || echo "⚠️ Client lint issues"

      - name: Type Check
        run: |
          pnpm --filter dnsmgr-server run build --noEmit 2>/dev/null || pnpm --filter dnsmgr-server run build

      - name: Quick Unit Test
        run: |
          pnpm --filter dnsmgr-server run test -- --testNamePattern="Database|Auth" --passWithNoTests || echo "⚠️ Some tests failed"

  file-check:
    name: File Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check File Size
        run: |
          LARGE_FILES=$(find . -type f -size +1M ! -path "./node_modules/*" ! -path "./.git/*" ! -path "./.pnpm/*" 2>/dev/null)

          if [ -n "$LARGE_FILES" ]; then
            echo "⚠️ 发现大文件(>1MB):"
            echo "$LARGE_FILES"
          fi

      - name: Check File Encoding
        run: |
          NON_UTF8=$(file -i $(find . -type f \( -name "*.ts" -o -name "*.js" -o -name "*.json" \) ! -path "./node_modules/*" ! -path "./.git/*" ! -path "./.pnpm/*" 2>/dev/null) | grep -v "charset=utf-8" || true)

          if [ -n "$NON_UTF8" ]; then
            echo "⚠️ 发现非UTF-8编码的文件:"
            echo "$NON_UTF8"
          fi

      - name: Check Trailing Whitespace
        run: |
          TRAILING=$(grep -r -l ' $' --include="*.ts" --include="*.js" --include="*.json" --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.pnpm . 2>/dev/null || true)

          if [ -n "$TRAILING" ]; then
            echo "⚠️ 发现行尾空格:"
            echo "$TRAILING"
          fi

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Check for Sensitive Patterns
        run: |
          PATTERNS=(
            "password\s*=\s*['\"][^'\"]+['\"]"
            "api[_-]?key\s*=\s*['\"][^'\"]+['\"]"
            "secret\s*=\s*['\"][^'\"]+['\"]"
            "token\s*=\s*['\"][^'\"]+['\"]"
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -r -i -n "$pattern" --include="*.ts" --include="*.js" --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.pnpm . 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "⚠️ 发现可能的敏感信息 ($pattern):"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo "请检查上述文件是否包含敏感信息"
          fi

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [commit-message, quick-test, file-check, security-check]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 提交检查摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**分支:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**提交:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 提交信息 | ${{ needs.commit-message.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 快速测试 | ${{ needs.quick-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 文件检查 | ${{ needs.file-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 安全检查 | ${{ needs.security-check.result }} |" >> $GITHUB_STEP_SUMMARY
