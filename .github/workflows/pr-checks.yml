name: PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # PR信息验证
  pr-info:
    name: PR Info
    runs-on: ubuntu-latest
    outputs:
      title: ${{ steps.pr-info.outputs.title }}
      body: ${{ steps.pr-info.outputs.body }}
      author: ${{ steps.pr-info.outputs.author }}
      branch: ${{ steps.pr-info.outputs.branch }}
      is_draft: ${{ steps.pr-info.outputs.is_draft }}
    steps:
      - name: Get PR Info
        id: pr-info
        run: |
          echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "body=${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT
          echo "author=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          echo "is_draft=${{ github.event.pull_request.draft }}" >> $GITHUB_OUTPUT

  # PR标题和描述检查
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    needs: pr-info
    steps:
      - name: Check PR Title
        run: |
          TITLE="${{ needs.pr-info.outputs.title }}"
          echo "PR Title: $TITLE"
          
          # 检查标题长度
          if [ ${#TITLE} -lt 10 ]; then
            echo "❌ PR标题太短，请至少10个字符"
            exit 1
          fi
          
          # 检查标题格式（可选）
          if [[ ! "$TITLE" =~ ^(feat|fix|docs|style|refactor|test|chore|ci|build|perf):\s.+ ]]; then
            echo "⚠️ PR标题建议使用 conventional commits 格式:"
            echo "   例如: feat: 添加新功能, fix: 修复bug"
          fi
          
          echo "✅ PR标题检查通过"

      - name: Check PR Description
        run: |
          BODY="${{ needs.pr-info.outputs.body }}"
          
          # 检查是否有描述
          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            echo "⚠️ PR没有描述，建议添加描述说明变更内容"
          else
            # 检查描述长度
            if [ ${#BODY} -lt 30 ]; then
              echo "⚠️ PR描述较短，建议添加更多详细信息"
            else
              echo "✅ PR描述检查通过"
            fi
          fi

  # 代码变更检查
  code-changes:
    name: Code Changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Change Size
        run: |
          # 获取变更的文件数和行数
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} | wc -l)
          CHANGED_LINES=$(git diff --stat origin/${{ github.base_ref }} | tail -1 | awk '{print $4}')
          
          echo "变更文件数: $CHANGED_FILES"
          echo "变更行数: $CHANGED_LINES"
          
          # 如果变更太多，给出警告
          if [ "$CHANGED_FILES" -gt 50 ]; then
            echo "⚠️ 变更文件数较多($CHANGED_FILES)，建议拆分PR"
          fi
          
          if [ -n "$CHANGED_LINES" ] && [ "$CHANGED_LINES" -gt 1000 ]; then
            echo "⚠️ 变更行数较多($CHANGED_LINES)，建议拆分PR"
          fi

      - name: Check Sensitive Files
        run: |
          # 检查是否修改了敏感文件
          SENSITIVE_FILES=$(git diff --name-only origin/${{ github.base_ref }} | grep -E "(\.env|secrets|credentials|password)" || true)
          
          if [ -n "$SENSITIVE_FILES" ]; then
            echo "⚠️ 检测到可能包含敏感信息的文件变更:"
            echo "$SENSITIVE_FILES"
            echo "请确保没有提交敏感信息！"
          fi

  # 依赖检查
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check Server Dependencies
        run: |
          cd server
          if [ -f package.json ]; then
            npm audit --audit-level=high || echo "⚠️ 发现安全漏洞，请检查"
          fi

      - name: Check Client Dependencies
        run: |
          cd client
          if [ -f package.json ]; then
            npm audit --audit-level=high || echo "⚠️ 发现安全漏洞，请检查"
          fi

  # 自动评论
  auto-comment:
    name: Auto Comment
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Welcome Comment
        uses: actions/github-script@v7
        with:
          script: |
            const message = `👋 感谢提交PR！
            
            ## 自动检查已启动
            
            以下检查将会运行：
            - ✅ 代码格式检查 (ESLint)
            - ✅ 类型检查 (TypeScript)
            - ✅ 单元测试
            - ✅ 集成测试 (SQLite/PostgreSQL/MySQL)
            - ✅ E2E测试
            - ✅ 安全审计
            
            ## PR规范
            
            - 标题建议使用 conventional commits 格式
            - 描述请说明变更内容和原因
            - 确保所有测试通过
            - 大型变更建议拆分PR
            
            如有问题请联系维护者。`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  # 检查PR是否可以合并
  merge-check:
    name: Merge Check
    runs-on: ubuntu-latest
    needs: [pr-validation, code-changes]
    steps:
      - name: Check Draft Status
        run: |
          if [ "${{ github.event.pull_request.draft }}" == "true" ]; then
            echo "⏸️ PR处于草稿状态，还不能合并"
            exit 1
          fi
          echo "✅ PR不是草稿状态"

      - name: Check Conflicts
        run: |
          if [ "${{ github.event.pull_request.mergeable }}" == "false" ]; then
            echo "❌ PR有合并冲突，请解决后再试"
            exit 1
          fi
          echo "✅ PR没有合并冲突"

  # 总结
  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [pr-info, pr-validation, code-changes, dependency-check]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## PR检查摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR标题:** ${{ needs.pr-info.outputs.title }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**作者:** @${{ needs.pr-info.outputs.author }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**分支:** ${{ needs.pr-info.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| PR验证 | ${{ needs.pr-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 代码变更 | ${{ needs.code-changes.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 依赖检查 | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
