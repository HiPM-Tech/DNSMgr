version: '3.8'

services:
  dnsmgr:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-dnsmgr}/dnsmgr:latest
    container_name: dnsmgr
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/init/status', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dnsmgr-network

  # Optional: MySQL database service
  # Uncomment if you want to use MySQL instead of SQLite
  # mysql:
  #   image: mysql:8.0
  #   container_name: dnsmgr-mysql
  #   restart: unless-stopped
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql-data:/var/lib/mysql
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=your_root_password
  #     - MYSQL_DATABASE=dnsmgr
  #     - MYSQL_USER=dnsmgr
  #     - MYSQL_PASSWORD=your_password
  #   command: --default-authentication-plugin=mysql_native_password
  #   networks:
  #     - dnsmgr-network

  # Optional: PostgreSQL database service
  # Uncomment if you want to use PostgreSQL instead of SQLite
  # postgresql:
  #   image: postgres:15-alpine
  #   container_name: dnsmgr-postgres
  #   restart: unless-stopped
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   environment:
  #     - POSTGRES_DB=dnsmgr
  #     - POSTGRES_USER=dnsmgr
  #     - POSTGRES_PASSWORD=your_password
  #   networks:
  #     - dnsmgr-network

networks:
  dnsmgr-network:
    driver: bridge

volumes:
